# Default Ollama backend — discovered by the gateway via K8s annotations.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ollama-default
  namespace: hermes
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/instance: ollama-default
spec:
  serviceName: ollama-default
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama
      app.kubernetes.io/instance: ollama-default
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama
        app.kubernetes.io/instance: ollama-default
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - name: http
              containerPort: 11434
              protocol: TCP
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 8Gi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: ollama-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
---
# Headless service for the StatefulSet + discovery annotations for the gateway.
apiVersion: v1
kind: Service
metadata:
  name: ollama-default
  namespace: hermes
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/instance: ollama-default
    hermes.io/enable: "true"
  annotations:
    hermes.io/enable: "true"
    hermes.io/provider-name: "ollama-default"
    hermes.io/provider-type: "ollama"
    hermes.io/port: "11434"
    hermes.io/models: "llama3:8b, gemma3:4b, qwen3:8b"
    hermes.io/default-model: "llama3:8b"
    hermes.io/weight: "5"
spec:
  clusterIP: None
  ports:
    - name: http
      port: 11434
      targetPort: http
  selector:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/instance: ollama-default
---
# GPU-accelerated Ollama backend — discovered via annotations.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ollama-gpu1
  namespace: hermes
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/instance: ollama-gpu1
spec:
  serviceName: ollama-gpu1
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama
      app.kubernetes.io/instance: ollama-gpu1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama
        app.kubernetes.io/instance: ollama-gpu1
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - name: http
              containerPort: 11434
              protocol: TCP
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          resources:
            requests:
              cpu: "1"
              memory: 4Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: 16Gi
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: ollama-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 100Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-gpu1
  namespace: hermes
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/instance: ollama-gpu1
    hermes.io/enable: "true"
  annotations:
    hermes.io/enable: "true"
    hermes.io/provider-name: "ollama-gpu1"
    hermes.io/provider-type: "ollama"
    hermes.io/port: "11434"
    hermes.io/models: "llama3:8b, llama3:70b, qwen3:8b, gemma3:12b"
    hermes.io/default-model: "llama3:8b"
    hermes.io/weight: "10"
    hermes.io/model-routing.llama3-70b: "ollama-gpu1"
spec:
  clusterIP: None
  ports:
    - name: http
      port: 11434
      targetPort: http
  selector:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/instance: ollama-gpu1
