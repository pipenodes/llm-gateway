# Ingress for external access to the gateway.
# Requires an Ingress controller (e.g. nginx-ingress, traefik, or cloud ALB).
#
# Adjust host, TLS, and annotations to match your environment.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hermes
  namespace: hermes
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "4m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    # Uncomment for TLS via cert-manager:
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
    - host: hermes.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hermes
                port:
                  name: http
  # Uncomment for TLS:
  # tls:
  #   - hosts:
  #       - hermes.example.com
  #     secretName: hermes-tls
