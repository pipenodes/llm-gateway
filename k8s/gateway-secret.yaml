# Gateway secrets — replace base64 values before applying.
#
#   echo -n 'your-value' | base64
#
apiVersion: v1
kind: Secret
metadata:
  name: hermes-secrets
  namespace: hermes
type: Opaque
data:
  # echo -n 'change-me-api-key' | base64
  API_KEY: Y2hhbmdlLW1lLWFwaS1rZXk=
  # echo -n 'change-me-admin-key' | base64
  ADMIN_KEY: Y2hhbmdlLW1lLWFkbWluLWtleQ==
  # Optional: external provider API keys
  # OPENROUTER_API_KEY: <base64>
