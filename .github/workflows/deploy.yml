# Build de imagem, push GHCR, attestation e deploy Kubernetes.
# Dispara em tag v* (commit deve estar na história de master ou main) ou workflow_dispatch manual.
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  KUSTOMIZE_VERSION: v5.4.3

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verificar tag na linha master/main
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          git fetch origin master main 2>/dev/null || true
          SHA="${GITHUB_SHA}"
          ok=false
          for b in master main; do
            if git show-ref --verify --quiet "refs/remotes/origin/${b}" 2>/dev/null; then
              if git merge-base --is-ancestor "$SHA" "origin/${b}"; then
                echo "OK: commit está na história de origin/${b}"
                ok=true
                break
              fi
            fi
          done
          if [ "$ok" != "true" ]; then
            echo "::error::A tag deve apontar para um commit ancestral de origin/master ou origin/main."
            exit 1
          fi

      - name: Diretório de cache APT (workspace, gravável pelo runner)
        run: mkdir -p "$GITHUB_WORKSPACE/.apt-cache/archives"

      - name: Cache pacotes APT
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.apt-cache
          key: ${{ runner.os }}-apt-llmgw-${{ hashFiles('.github/workflows/ci.yml', '.github/workflows/deploy.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-llmgw-

      - name: Instalar dependências de build
        run: |
          echo "Dir::Cache::Archives \"$GITHUB_WORKSPACE/.apt-cache/archives\";" | sudo tee /etc/apt/apt.conf.d/99github-cache
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libjsoncpp-dev libssl-dev libcurl4-openssl-dev libyaml-cpp-dev wget
          sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE/.apt-cache"

      - name: Configurar e executar testes
        run: |
          make all
          ./hermes &
          sleep 2
          curl -sf http://localhost:8080/health | grep -q '"ok"'
          curl -sf http://localhost:8080/metrics | grep -q '"uptime_seconds"'
          kill %1 || true

  build-push-deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    environment: llm-gateway-pipenodes-secrets
    env:
      K8S_API_SERVER: ${{ vars.K8S_API_SERVER || 'https://k3s.pipenodes.com' }}
      K8S_SKIP_TLS_VERIFY: ${{ vars.K8S_SKIP_TLS_VERIFY || secrets.K8S_SKIP_TLS_VERIFY || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache binário Kustomize
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/kustomize-bin
          key: kustomize-${{ env.KUSTOMIZE_VERSION }}-linux-amd64

      - name: Instalar Kustomize
        run: |
          mkdir -p "${{ runner.temp }}/kustomize-bin"
          if [ ! -x "${{ runner.temp }}/kustomize-bin/kustomize" ]; then
            curl -fsSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${{ env.KUSTOMIZE_VERSION }}/kustomize_${{ env.KUSTOMIZE_VERSION }}_linux_amd64.tar.gz" \
              | tar xz -C "${{ runner.temp }}/kustomize-bin"
          fi
          sudo install -m 755 "${{ runner.temp }}/kustomize-bin/kustomize" /usr/local/bin/

      - uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Imagem (nome em minúsculas para o Docker)
        run: |
          echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Lista de tags (v* na imagem só em push de tag)
        id: imgtags
        run: |
          IMG="${{ env.IMAGE }}"
          SHA="${{ github.sha }}"
          {
            echo "tags<<TAGS_EOF"
            echo "${IMG}:${SHA}"
            echo "${IMG}:latest"
            if [ "${{ github.ref_type }}" = "tag" ]; then
              echo "${IMG}:${{ github.ref_name }}"
            fi
            echo "TAGS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push da imagem
        id: docker-build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.imgtags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attestation de proveniência da imagem
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.docker-build.outputs.digest }}
          push-to-registry: true

      - name: Configurar kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG }}" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Definir endpoint da API do cluster
        run: |
          CLUSTER=$(kubectl config view --minify -o jsonpath='{.clusters[0].name}')
          kubectl config set-cluster "$CLUSTER" --server="${K8S_API_SERVER}"

      - name: Ajustar TLS do cluster (x509 / CA)
        run: |
          CLUSTER=$(kubectl config view --minify -o jsonpath='{.clusters[0].name}')
          SK="${K8S_SKIP_TLS_VERIFY}"
          SK=$(echo "$SK" | tr '[:upper:]' '[:lower:]')
          if [ "$SK" = "true" ] || [ "$SK" = "1" ] || [ "$SK" = "yes" ]; then
            kubectl config set-cluster "$CLUSTER" --insecure-skip-tls-verify=true
          fi

      - name: Verificar API Kubernetes (descoberta)
        run: |
          echo "kubeconfig server:"
          kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}' && echo
          kubectl get --raw /version

      - name: Aplicar manifests no Kubernetes
        run: |
          cd k8s
          kustomize edit set image "pipenodes/llm-gateway=${IMAGE}:${{ github.sha }}"
          kubectl apply --validate=false -k .
        env:
          IMAGE: ${{ env.IMAGE }}
