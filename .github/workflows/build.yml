name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libjsoncpp-dev wget
      - name: Build
        run: make all
      - name: Verify binary
        run: ls -la hermes
      - name: Smoke test
        run: |
          ./hermes &
          sleep 2
          curl -sf http://localhost:8080/health | grep -q '"ok"'
          curl -sf http://localhost:8080/metrics | grep -q '"uptime_seconds"'
          curl -sf http://localhost:8080/metrics/prometheus | grep -q 'gateway_requests_total'
          kill %1 || true

  asan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libjsoncpp-dev wget
      - name: Build with AddressSanitizer
        run: make asan
      - name: Run with ASan
        run: |
          ./hermes &
          sleep 2
          curl -sf http://localhost:8080/health
          curl -sf http://localhost:8080/metrics
          kill %1 || true

  tsan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libjsoncpp-dev wget
      - name: Build with ThreadSanitizer
        run: make tsan
      - name: Run with TSan
        run: |
          ./hermes &
          sleep 2
          curl -sf http://localhost:8080/health
          curl -sf http://localhost:8080/metrics
          kill %1 || true

  edge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libjsoncpp-dev wget
      - name: Build edge
        run: make edge
      - name: Verify edge binary
        run: ls -la hermes
      - name: Smoke test edge
        run: |
          ./hermes &
          sleep 2
          curl -sf http://localhost:8080/health | grep -q '"ok"'
          curl -sf http://localhost:8080/metrics | grep -q '"uptime_seconds"'
          curl -sf http://localhost:8080/metrics/prometheus | grep -q 'gateway_requests_total'
          kill %1 || true

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t hermes .
      - name: Test Docker container
        run: |
          docker run -d --name test-gw -p 8081:8080 hermes
          sleep 3
          curl -sf http://localhost:8081/health | grep -q '"ok"'
          docker stop test-gw

  docker-edge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker edge image
        run: docker build -f Dockerfile.edge -t hermes:edge .
      - name: Test Docker edge container
        run: |
          docker run -d --name test-gw-edge -p 8082:8080 hermes:edge
          sleep 3
          curl -sf http://localhost:8082/health | grep -q '"ok"'
          curl -sf http://localhost:8082/metrics | grep -q '"uptime_seconds"'
          docker stop test-gw-edge
